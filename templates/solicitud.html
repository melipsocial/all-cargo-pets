    <div class="wizard-container" style="position:relative; z-index:10;">
        <h2 style="text-align: center; margin-bottom: 2rem;">¿Cómo te podemos ayudar hoy?</h2>
        
        <div class="step-indicator">
            <div class="step active" id="step-id-1">1</div>
            <div class="step" id="step-id-2">2</div>
            <div class="step" id="step-id-3">3</div>
            <div class="step" id="step-id-4">✔️</div>
        </div>

        <form id="leadForm">
            <!-- P1: Tipo Solicitud -->
            <div class="wizard-card active" id="card-1">
                <div class="form-group">
                    <label>¿Qué tipo de solicitud deseas realizar?</label>
                    <div class="radio-cards">
                        <label class="radio-card selected" onclick="selectRadioCard(this)">
                            <input type="radio" name="tipo_solicitud" value="Viajar con mi mascota" checked>
                            <span style="font-size: 2rem; margin-bottom: 0.5rem">💺</span>
                            <span>Viajar con mi mascota</span>
                        </label>
                        <label class="radio-card" onclick="selectRadioCard(this)">
                            <input type="radio" name="tipo_solicitud" value="Enviar / trasladar mi mascota">
                            <span style="font-size: 2rem; margin-bottom: 0.5rem">✈️</span>
                            <span>Enviar / trasladar mi mascota a otro país</span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Tipo de servicio requerido</label>
                    <select name="tipo_servicio">
                        <option value="solo asesoría">Solo asesoría</option>
                        <option value="gestión completa">Gestión completa</option>
                    </select>
                </div>
            </div>

            <!-- P2: Datos Generales (Para ambos) -->
            <div class="wizard-card" id="card-2">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>País de Origen</label>
                        <input type="text" name="pais_origen" required placeholder="Ej: México">
                    </div>
                    <div class="form-group">
                        <label>País de Destino</label>
                        <input type="text" name="pais_destino" required placeholder="Ej: España">
                    </div>
                </div>
                <div class="form-group">
                    <label>Fecha Estimada del Viaje / Traslado</label>
                    <input type="date" name="fecha_estimada" required>
                </div>
                <div style="background: #f8f9fa; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem">
                    <h4>Datos de la Mascota 🐾</h4>
                    <br>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <input type="text" name="tipo_mascota" placeholder="Perro, Gato..." required class="form-group input">
                        <input type="text" name="raza" placeholder="Raza" required>
                        <input type="text" name="peso" placeholder="Peso (Kg)" required>
                        <input type="text" name="edad" placeholder="Edad" required>
                    </div>
                </div>
            </div>

            <!-- P3: Datos Específicos & Personales -->
            <div class="wizard-card" id="card-3">
                <div id="dynamic-viaje" style="display:none; padding: 1rem; background: #e0e7ff; border-radius: 8px; margin-bottom:1rem;">
                    <h4>Detalles del Viaje</h4><br>
                    <input type="text" name="aerolinea" placeholder="¿Ya tienes aerolínea? (Opcional)" style="margin-bottom:1rem; width:100%; padding:0.85rem">
                    <select name="cabina_o_bodega" style="width:100%; padding:0.85rem">
                        <option value="">¿Dónde viaja la mascota?</option>
                        <option value="cabina">En Cabina conmigo</option>
                        <option value="bodega">En Bodega</option>
                        <option value="no se">Aún no sé</option>
                    </select>
                </div>

                <div id="dynamic-traslado" style="display:none; padding: 1rem; background: #e0e7ff; border-radius: 8px; margin-bottom:1rem;">
                    <h4>Detalles del Traslado</h4><br>
                     <select name="acompanamiento" style="width:100%; padding:0.85rem">
                        <option value="">¿La mascota viaja sola o acompañada?</option>
                        <option value="sola">Viaja Sola (Cargo)</option>
                        <option value="acompanada">Llevará acompañante (Tutor externo)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Documentación Actual con la que cuentas</label>
                    <select name="documentacion_actual">
                        <option value="nada">Aún nada / No sé por dónde empezar</option>
                        <option value="vacunas">Solo vacunas al día</option>
                        <option value="chip_vacunas">Microchip y vacunas</option>
                        <option value="pasaporte">Pasaporte listo</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Tu Nombre Completo</label>
                        <input type="text" name="nombre_completo" required placeholder="Juan Pérez">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" required placeholder="correo@ejemplo.com">
                        </div>
                        <div class="form-group">
                            <label>WhatsApp</label>
                            <input type="text" name="whatsapp" required placeholder="+52 1234567890">
                        </div>
                    </div>
                </div>
            </div>

            <!-- P4: Success -->
            <div class="wizard-card" id="card-4" style="text-align: center; padding: 2rem 0;">
                <div style="font-size: 4rem; color: var(--success); margin-bottom: 1rem;">✔️</div>
                <h3 id="success-title">¡Solicitud Recibida!</h3>
                <p id="success-message">Gracias. Un asesor revisará tu caso y se pondrá en contacto pronto por WhatsApp o Email.</p>
                <br>
                <a href="/" class="btn-primary">Volver al inicio</a>
            </div>

            <div class="wizard-footer" id="wizard-footer">
                <button type="button" class="btn-outline" id="btn-prev" style="visibility: hidden;">Anterior</button>
                <button type="button" class="btn-primary" id="btn-next">Siguiente paso ➔</button>
            </div>
        </form>
    </div>

    <script src="/static/js/wizard.js"></script>
</body>
</html>
